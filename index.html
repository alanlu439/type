<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Type is a one-page 3D typewriter simulator with animated keys, striking typebars, sound effects, and PDF export."
    />
    <title>Type - 3D Typewriter Simulator</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="type-app" aria-labelledby="app-title">
      <header class="top-bar" role="toolbar" aria-label="Type controls">
        <a class="brand" href="./" id="app-title" aria-label="Type home">Type</a>

        <div class="toolbar-cluster">
          <button class="control-button sound-toggle" type="button" data-sound-toggle aria-pressed="true">
            <span class="sound-icon" aria-hidden="true"></span>
            <span data-sound-label>Sound on</span>
            <span class="live-dot" aria-hidden="true"></span>
          </button>

          <button class="control-button" type="button" data-reset>
            <span class="reset-icon" aria-hidden="true"></span>
            Reset
          </button>
        </div>

        <div class="toolbar-cluster swatch-group" aria-label="Ink color">
          <span class="tool-label">Ink</span>
          <button class="swatch ink-swatch is-selected" type="button" data-ink="#201b17" style="--swatch: #201b17" aria-label="Black ink" aria-pressed="true"></button>
          <button class="swatch ink-swatch" type="button" data-ink="#1d2b53" style="--swatch: #1d2b53" aria-label="Blue ink" aria-pressed="false"></button>
          <button class="swatch ink-swatch" type="button" data-ink="#641b1f" style="--swatch: #641b1f" aria-label="Burgundy ink" aria-pressed="false"></button>
        </div>

        <div class="toolbar-cluster swatch-group" aria-label="Paper tone">
          <span class="tool-label">Paper</span>
          <button class="swatch paper-swatch is-selected" type="button" data-paper="ivory" style="--swatch: #efe2ca" aria-label="Ivory paper" aria-pressed="true"></button>
          <button class="swatch paper-swatch" type="button" data-paper="linen" style="--swatch: #dbc39c" aria-label="Linen paper" aria-pressed="false"></button>
          <button class="swatch paper-swatch" type="button" data-paper="mist" style="--swatch: #d8d4c9" aria-label="Mist paper" aria-pressed="false"></button>
        </div>

        <div class="toolbar-cluster status-panel" aria-live="polite">
          <span class="ready-state" data-ready-label>Ready</span>
          <span class="word-count"><span>Words</span><strong data-word-count>0</strong></span>
        </div>

        <button class="control-button export-button" type="button" data-export-pdf>
          <span class="download-icon" aria-hidden="true"></span>
          Export PDF
        </button>
      </header>

      <aside class="command-rail" data-command-rail aria-label="Typewriter command rail">
        <div class="rail-copy">
          <p class="rail-kicker">Typewriter simulator</p>
          <p>Type anywhere on the page, or use the deck controls for classic machine tricks.</p>
        </div>

        <div class="mini-keyboard" aria-hidden="true">
          <div class="mini-row">
            <span>~</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>0</span><span>-</span><span>=</span>
          </div>
          <div class="mini-row">
            <span class="wide">Tab</span><span>Q</span><span>W</span><span>E</span><span>R</span><span>T</span><span>Y</span><span>U</span><span>I</span><span>O</span><span>P</span>
          </div>
          <div class="mini-row">
            <span class="wide">Caps</span><span>A</span><span>S</span><span>D</span><span>F</span><span>G</span><span>H</span><span>J</span><span>K</span><span>L</span><span class="wide">Return</span>
          </div>
          <div class="mini-row">
            <span class="wide">Shift</span><span>Z</span><span>X</span><span>C</span><span>V</span><span>B</span><span>N</span><span>M</span><span>,</span><span>.</span><span>/</span>
          </div>
        </div>

        <div class="rail-actions" aria-label="Reference-inspired commands">
          <button class="rail-command" type="button" data-ribbon-cycle>
            <span>Change ribbon</span><kbd>F1</kbd>
          </button>
          <button class="rail-command" type="button" data-zoom-out>
            <span>Zoom out</span><kbd>Esc</kbd>
          </button>
          <button class="rail-command" type="button" data-whiteout>
            <span>Apply white-out</span><kbd>Del</kbd>
          </button>
          <button class="rail-command" type="button" data-sidebar-toggle aria-expanded="true">
            <span data-sidebar-label>Hide sidebar</span><kbd>Tab</kbd>
          </button>
          <button class="rail-command" type="button" data-snapshot>
            <span>Save as image</span>
          </button>
          <button class="rail-command" type="button" data-rotate-left>
            <span>Rotate left</span><kbd>F5</kbd>
          </button>
          <button class="rail-command" type="button" data-rotate-right>
            <span>Rotate right</span><kbd>F6</kbd>
          </button>
          <button class="rail-command" type="button" data-clear-page>
            <span>Clear page</span><kbd>F10</kbd>
          </button>
        </div>
      </aside>

      <button class="rail-peek" type="button" data-sidebar-toggle aria-expanded="true">
        <span data-sidebar-label>Hide sidebar</span>
      </button>

      <section class="scene-stage" aria-label="3D typewriter simulator" data-stage>
        <canvas class="typewriter-canvas" data-scene aria-hidden="true"></canvas>
        <textarea
          id="writer-input"
          class="writer-input"
          data-input
          spellcheck="false"
          autocomplete="off"
          autocapitalize="sentences"
          aria-label="Type your page"
        ></textarea>
        <div class="sr-only" data-output aria-live="polite"></div>
      </section>
    </main>

    <script type="module" src="script.js"></script>
  </body>
</html>
