<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Type is a one-page 3D typewriter simulator with animated keys, striking typebars, sound effects, and PDF export."
    />
    <title>Type - 3D Typewriter Simulator</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="type-app" aria-labelledby="app-title">
      <header class="top-bar" role="toolbar" aria-label="Type controls">
        <a class="brand" href="./" id="app-title" aria-label="Type home">Type</a>

        <div class="toolbar-cluster">
          <button class="control-button sound-toggle" type="button" data-sound-toggle aria-pressed="true">
            <svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4.5 9.3h3.4l4.6-3.6v12.6l-4.6-3.6H4.5z"></path>
              <path d="M16 8.3a5.1 5.1 0 0 1 0 7.4"></path>
              <path d="M18.7 5.8a8.6 8.6 0 0 1 0 12.4"></path>
            </svg>
            <span data-sound-label>Sound on</span>
            <span class="live-dot" aria-hidden="true"></span>
          </button>

          <button class="control-button" type="button" data-reset>
            <svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 8.7A7.1 7.1 0 1 1 6.2 17"></path>
              <path d="M5 4.8v3.9h3.9"></path>
            </svg>
            Reset
          </button>

          <button class="control-button focus-toggle" type="button" data-focus-mode aria-pressed="false">
            <svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8.2 4.5H5.7a1.2 1.2 0 0 0-1.2 1.2v2.5"></path>
              <path d="M15.8 4.5h2.5a1.2 1.2 0 0 1 1.2 1.2v2.5"></path>
              <path d="M19.5 15.8v2.5a1.2 1.2 0 0 1-1.2 1.2h-2.5"></path>
              <path d="M8.2 19.5H5.7a1.2 1.2 0 0 1-1.2-1.2v-2.5"></path>
              <circle cx="12" cy="12" r="2.45"></circle>
              <path d="M12 8.5v-1.2"></path>
              <path d="M12 16.7v-1.2"></path>
            </svg>
            <span data-focus-label>Focus</span>
          </button>
        </div>

        <div class="toolbar-cluster swatch-group" aria-label="Ink color">
          <span class="tool-label">Ink</span>
          <button class="swatch ink-swatch is-selected" type="button" data-ink="#201b17" style="--swatch: #201b17" aria-label="Black ink" aria-pressed="true"></button>
          <button class="swatch ink-swatch" type="button" data-ink="#1d2b53" style="--swatch: #1d2b53" aria-label="Blue ink" aria-pressed="false"></button>
          <button class="swatch ink-swatch" type="button" data-ink="#641b1f" style="--swatch: #641b1f" aria-label="Burgundy ink" aria-pressed="false"></button>
        </div>

        <div class="toolbar-cluster swatch-group" aria-label="Paper tone">
          <span class="tool-label">Paper</span>
          <button class="swatch paper-swatch is-selected" type="button" data-paper="ivory" style="--swatch: #efe2ca" aria-label="Ivory paper" aria-pressed="true"></button>
          <button class="swatch paper-swatch" type="button" data-paper="linen" style="--swatch: #dbc39c" aria-label="Linen paper" aria-pressed="false"></button>
          <button class="swatch paper-swatch" type="button" data-paper="mist" style="--swatch: #d8d4c9" aria-label="Mist paper" aria-pressed="false"></button>
        </div>

        <button class="control-button export-button" type="button" data-export-pdf>
          <svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 3.8h7l3 3v13.4H7z"></path>
            <path d="M14 3.8v4h4"></path>
            <path d="M12 10.5v5"></path>
            <path d="m9.8 13.4 2.2 2.2 2.2-2.2"></path>
          </svg>
          Export PDF
        </button>
      </header>

      <aside class="command-rail" data-command-rail aria-label="Typewriter shortcuts">
        <div class="rail-actions" aria-label="Typewriter controls">
          <button class="rail-command" type="button" data-ribbon-cycle>
            <span>Change ribbon</span><kbd>F1</kbd>
          </button>
          <button class="rail-command" type="button" data-margin-release>
            <span>Margin release</span><kbd>Alt</kbd>
          </button>
          <button class="rail-command" type="button" data-correction-ribbon>
            <span>Correction ribbon</span><kbd>Del</kbd>
          </button>
          <button class="rail-command" type="button" data-tab-stop>
            <span>Tab stop</span><kbd>Tab</kbd>
          </button>
          <button class="rail-command" type="button" data-left-margin>
            <span>Set left margin</span><kbd>F3</kbd>
          </button>
          <button class="rail-command" type="button" data-right-margin>
            <span>Set right margin</span><kbd>F4</kbd>
          </button>
          <button class="rail-command" type="button" data-paper-up>
            <span>Paper up</span><kbd>PgUp</kbd>
          </button>
          <button class="rail-command" type="button" data-paper-down>
            <span>Paper down</span><kbd>PgDn</kbd>
          </button>
          <button class="rail-command" type="button" data-carriage-return>
            <span>Carriage return</span><kbd>Enter</kbd>
          </button>
          <button class="rail-command" type="button" data-clear-page>
            <span>New sheet</span><kbd>F10</kbd>
          </button>
        </div>
      </aside>

      <section class="scene-stage" aria-label="3D typewriter simulator" data-stage>
        <canvas class="typewriter-canvas" data-scene aria-hidden="true"></canvas>
        <textarea
          id="writer-input"
          class="writer-input"
          data-input
          spellcheck="false"
          autocomplete="off"
          autocapitalize="sentences"
          aria-label="Type your page"
        ></textarea>
        <div class="sr-only" data-output aria-live="polite"></div>
      </section>
    </main>

    <script type="module" src="script.js"></script>
  </body>
</html>
